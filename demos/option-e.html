<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Option E — Corridor Fill</title>
  <style>
    body { margin: 0; font-family: Inter, sans-serif; background: #0f0f1a; color: #fff; }
    #map { width: 100vw; height: 100vh; }
    .info {
      position: fixed; top: 16px; left: 16px; background: rgba(15,15,26,0.95);
      border: 1px solid rgba(124,58,237,0.4); border-radius: 10px; padding: 14px 18px;
      z-index: 10; max-width: 280px;
    }
    .info h2 { margin: 0 0 8px; font-size: 16px; color: #a78bfa; }
    .info p  { margin: 0; font-size: 12px; color: #9ca3af; line-height: 1.5; }
    .badge {
      display: inline-block; background: #7c3aed; color: #fff; border-radius: 6px;
      padding: 2px 8px; font-size: 11px; font-weight: 700; margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="info">
    <span class="badge">Option E</span>
    <h2>Corridor Fill</h2>
    <p>Semi-transparent colored polygon filling the road corridor width. Makes the road feel like a "zone" rather than a line. Centerline on top.</p>
  </div>
  <div id="map"></div>
  <script>
    window.__googleMapsInit = () => window.dispatchEvent(new Event('google-maps-loaded'));
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAYWTVV8wHpjQMDLX388HFp2duaNB_BoJU&libraries=geometry&callback=__googleMapsInit" async defer></script>
  <script type="module">
    await new Promise(r => google?.maps ? r() : window.addEventListener('google-maps-loaded', r));

    const map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 28.4595, lng: 77.0266 },
      zoom: 12,
      mapTypeId: 'roadmap',
    });

    const EXPRESSWAY_COLORS = {
      highway: '#fcd34d',
      express: '#f97316',
    };

    const EXPRESSWAY_DEFS = [
      { id: 'nh48',      label: 'NH-48',      color: EXPRESSWAY_COLORS.highway, path: [{ lat: 28.5700, lng: 76.9500 },{ lat: 28.5300, lng: 77.0100 },{ lat: 28.4950, lng: 77.0700 },{ lat: 28.4700, lng: 77.1200 },{ lat: 28.4400, lng: 77.1700 },{ lat: 28.4100, lng: 77.2200 }] },
      { id: 'dwarka_exp', label: 'Dwarka Exp', color: EXPRESSWAY_COLORS.express, path: [{ lat: 28.6100, lng: 76.9900 },{ lat: 28.5900, lng: 77.0200 },{ lat: 28.5650, lng: 77.0500 },{ lat: 28.5450, lng: 77.0700 },{ lat: 28.5200, lng: 77.0900 },{ lat: 28.4900, lng: 77.1000 }] },
      { id: 'yamuna_exp', label: 'Yamuna Exp', color: EXPRESSWAY_COLORS.express, path: [{ lat: 28.5800, lng: 77.5000 },{ lat: 28.5600, lng: 77.4200 },{ lat: 28.5400, lng: 77.3300 },{ lat: 28.5200, lng: 77.2600 },{ lat: 28.5000, lng: 77.2000 }] },
    ];

    function buildCorridorPolygon(path, halfWidthMeters) {
      const R = 6378137;
      const pts = [];
      const rev = [];
      path.forEach(pt => {
        const latOffset = (halfWidthMeters / R) * (180 / Math.PI);
        const lngOffset = (halfWidthMeters / R) * (180 / Math.PI) / Math.cos(pt.lat * Math.PI / 180);
        pts.push({ lat: pt.lat + latOffset, lng: pt.lng });
        rev.unshift({ lat: pt.lat - latOffset, lng: pt.lng });
      });
      return [...pts, ...rev];
    }

    EXPRESSWAY_DEFS.forEach(exp => {
      const isExpress = exp.id !== 'nh48';
      const corridorWidth = isExpress ? 400 : 500;

      // Corridor polygon
      new google.maps.Polygon({
        paths: buildCorridorPolygon(exp.path, corridorWidth),
        fillColor: exp.color,
        fillOpacity: 0.18,
        strokeColor: exp.color,
        strokeWeight: 0,
        map,
        zIndex: 0,
      });

      // Border lines
      new google.maps.Polyline({
        path: exp.path,
        strokeColor: exp.color,
        strokeWeight: 3,
        strokeOpacity: 0.8,
        map,
        zIndex: 1,
      });

      // Label at midpoint
      const mid = exp.path[Math.floor(exp.path.length / 2)];
      new google.maps.Marker({
        position: mid,
        map,
        icon: {
          path: 'M -18,-9 L 18,-9 L 18,9 L -18,9 Z',
          fillColor: exp.color,
          fillOpacity: 0.95,
          strokeColor: '#000',
          strokeWeight: 1,
        },
        label: {
          text: exp.label,
          fontSize: '10px',
          fontWeight: '800',
          color: '#000',
        },
        zIndex: 2,
      });
    });
  </script>
</body>
</html>
